apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-deployment
spec:
  replicas: 7
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project
    spec:
      containers:
      - name: project
        image: sonarqube:8.7-community
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: project-service
spec:
  selector:
    app: project  # This should match the labels of your Deployment
  ports:
    - protocol: TCP
      port: 80       # Port that the service will expose
      targetPort: 80 # Port on the pod that the service should forward traffic to
  type: NodePort # Change to ClusterIP or NodePort based on your needs 
